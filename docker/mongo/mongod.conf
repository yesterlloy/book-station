# ============================================
# MongoDB 配置文件
# ============================================

# 网络配置
net:
  port: 27017
  bindIp: 0.0.0.0
  maxIncomingConnections: 1000

# 存储配置
storage:
  dbPath: /data/db
  journal:
    enabled: true
    commitIntervalMs: 100
  wiredTiger:
    engineConfig:
      cacheSizeGB: 0.25
      statisticsLogDelaySecs: 0
    collectionConfig:
      blockCompressor: snappy
    indexConfig:
      prefixCompression: true

# 日志配置
systemLog:
  destination: file
  path: /var/log/mongodb/mongod.log
  logAppend: true
  verbosity: 0

# 进程管理
processManagement:
  fork: false
  pidFilePath: /var/run/mongodb/mongod.pid

# 安全配置
security:
  authorization: enabled

# 性能优化
operationProfiling:
  mode: slowOp
  slowOpThresholdMs: 100
