<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>小说阅读器 - BookStation</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="reader-header" id="header">
        <div class="header-content">
            <button class="icon-btn" id="backBtn" title="返回">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1 class="novel-title" id="novelTitle">加载中...</h1>
            <button class="icon-btn" id="menuBtn" title="设置">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="6" r="1"/>
                    <circle cx="12" cy="12" r="1"/>
                    <circle cx="12" cy="18" r="1"/>
                </svg>
            </button>
        </div>
    </header>

    <!-- 章节标题 -->
    <div class="chapter-title-container" id="chapterTitleContainer">
        <h2 class="chapter-title" id="chapterTitle">第1章 示例章节</h2>
    </div>

    <!-- 阅读内容区域 -->
    <main class="reader-content" id="readerContent">
        <div class="content-inner" id="contentInner">
            <div class="loading" style="text-align: center; padding: 60px;">
                <div class="spinner"></div>
                <p style="margin-top: 16px; color: #999;">正在加载章节内容...</p>
                <p style="font-size: 13px; color: #ccc; margin-top: 8px;">
                    💡 请确保后端服务已启动，并已执行 <code>node seed-data.js</code> 插入测试数据
                </p>
            </div>
        </div>
    </main>

    <!-- 阅读进度条 -->
    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- 底部导航栏 -->
    <footer class="reader-footer" id="footer">
        <button class="nav-btn" id="prevChapter">
            <span class="nav-icon">⏮</span>
            <span>上一章</span>
        </button>
        <button class="nav-btn" id="chapterListBtn">
            <span class="nav-icon">📋</span>
            <span>目录</span>
        </button>
        <button class="nav-btn" id="settingsBtn">
            <span class="nav-icon">⚙</span>
            <span>设置</span>
        </button>
        <button class="nav-btn" id="nextChapter">
            <span class="nav-icon">⏭</span>
            <span>下一章</span>
        </button>
    </footer>

    <!-- 设置面板 -->
    <div class="settings-panel" id="settingsPanel">
        <div class="panel-overlay" id="settingsOverlay"></div>
        <div class="panel-content">
            <div class="panel-header">
                <h3>阅读设置</h3>
                <button class="close-btn" id="closeSettings">✕</button>
            </div>

            <div class="setting-section">
                <label class="setting-label">字体大小: <span id="fontSizeValue">18</span>px</label>
                <div class="setting-control">
                    <button class="control-btn" data-action="decreaseFont">A-</button>
                    <input type="range" id="fontSizeSlider" min="14" max="28" value="18" step="1">
                    <button class="control-btn" data-action="increaseFont">A+</button>
                </div>
            </div>

            <div class="setting-section">
                <label class="setting-label">行高: <span id="lineHeightValue">1.8</span></label>
                <div class="setting-control">
                    <input type="range" id="lineHeightSlider" min="1.4" max="2.5" value="1.8" step="0.1">
                </div>
            </div>

            <div class="setting-section">
                <label class="setting-label">主题模式</label>
                <div class="theme-selector">
                    <button class="theme-btn theme-light active" data-theme="light">
                        <span class="theme-preview"></span>
                        <span>日间</span>
                    </button>
                    <button class="theme-btn theme-dark" data-theme="dark">
                        <span class="theme-preview"></span>
                        <span>夜间</span>
                    </button>
                    <button class="theme-btn theme-sepia" data-theme="sepia">
                        <span class="theme-preview"></span>
                        <span>护眼</span>
                    </button>
                </div>
            </div>

            <div class="setting-section">
                <label class="setting-label">背景颜色</label>
                <div class="bg-selector">
                    <button class="bg-btn active" data-bg="#ffffff" style="background: #ffffff;"></button>
                    <button class="bg-btn" data-bg="#f5f5dc" style="background: #f5f5dc;"></button>
                    <button class="bg-btn" data-bg="#e8f4e8" style="background: #e8f4e8;"></button>
                    <button class="bg-btn" data-bg="#f0e8d9" style="background: #f0e8d9;"></button>
                    <button class="bg-btn" data-bg="#1a1a1a" style="background: #1a1a1a;"></button>
                </div>
            </div>

            <div class="setting-section">
                <label class="setting-label">自动保存进度</label>
                <div class="setting-control">
                    <label class="switch">
                        <input type="checkbox" id="autoSaveProgress" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- 章节目录面板 -->
    <div class="chapter-panel" id="chapterPanel">
        <div class="panel-overlay" id="chapterOverlay"></div>
        <div class="panel-content">
            <div class="panel-header">
                <h3>章节目录</h3>
                <button class="close-btn" id="closeChapter">✕</button>
            </div>
            <div class="chapter-list" id="chapterList">
                <!-- 章节列表动态生成 -->
            </div>
        </div>
    </div>

    <!-- 提示消息 -->
    <div class="toast" id="toast"></div>

    <script src="js/dom.js"></script>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/reader.js"></script>
</body>
</html>
