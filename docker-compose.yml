version: '3.8'

# 项目名称
name: bookstation

# 服务定义
services:
  # MongoDB 数据库
  mongodb:
    image: mongo:6-jammy
    container_name: bookstation-mongodb
    restart: unless-stopped
    # 生产环境建议不对外暴露 MongoDB 端口，仅在需要时开启
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-password}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-bookstation}
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo/init.js:/docker-entrypoint-initdb.d/init.js:ro
      # MongoDB 配置文件挂载（可选）
      - ./docker/mongo/mongod.conf:/etc/mongod.conf:ro
    networks:
      - bookstation-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    # MongoDB 性能优化参数
    command: --wiredTigerCacheSizeGB 0.25 --logpath /var/log/mongodb/mongod.log --logappend

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: bookstation-redis
    restart: unless-stopped
    # 生产环境建议不对外暴露 Redis 端口，仅在需要时开启
    ports:
      - "${REDIS_PORT:-6380}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_password}
      --appendonly yes
      --aof-use-rdb-preamble yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --tcp-keepalive 300
      --timeout 0
    volumes:
      - redis_data:/data
    networks:
      - bookstation-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis_password} ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          cpus: '0.1'
          memory: 128M

  # 后端 API 服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${NODE_ENV:-production}
    container_name: bookstation-backend
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    # 开发环境可直接访问后端 API，生产环境建议通过 nginx 访问
    ports:
      - "${BACKEND_PORT:-6001}:6001"
    # 从环境文件加载配置
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - HOST=0.0.0.0
      - PORT=6001
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend/logs:/app/logs
      - ./backend/uploads:/app/uploads
      # 开发环境可挂载源代码实现热重载
      - ${BACKEND_SRC_MOUNT:-./backend/src}:/app/src:ro
    networks:
      - bookstation-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

  # 管理后台 - React + Nginx 静态服务
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      target: production
    container_name: bookstation-admin
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    # 管理后台端口
    ports:
      - "${ADMIN_PORT:-6003}:80"
    networks:
      - bookstation-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 64M

  # Nginx 反向代理 + 前端静态服务
  nginx:
    image: nginx:1.25-alpine
    container_name: bookstation-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-6002}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend:/var/www/frontend:ro
      - ./frontend/reader:/var/www/reader:ro
      - ./admin/dist:/var/www/admin:ro
      - ./docker/nginx/logs:/var/log/nginx
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      # 缓存目录
      - nginx_cache:/var/cache/nginx
    networks:
      - bookstation-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    # 确保 nginx 有足够的文件描述符
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535

# 网络配置
networks:
  bookstation-network:
    driver: bridge
    name: bookstation-network

# 数据卷
volumes:
  mongodb_data:
    driver: local
    name: bookstation-mongodb-data
  redis_data:
    driver: local
    name: bookstation-redis-data
  nginx_cache:
    driver: local
    name: bookstation-nginx-cache
